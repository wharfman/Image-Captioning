<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Captioner</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Lora:ital@0;1&family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />
  <style>
    /* ---- Claude-inspired palette: warm cream, soft ink, muted clay accent ---- */
    :root {
      /* dark theme: neutral near-black (not pure #000); page glows gently
         brighter at the center and falls off toward the edges */
      --bg: #141414;          /* edge tone */
      --bg-center: #1e1e1e;   /* subtly lighter center */
      --bg-input: #222222;
      --ink: #e9e7e2;
      --ink-soft: #9b9891;
      --edge: #2e2e2e;
      --edge-strong: #3a3a3a;
      --accent: #c96442;
      --accent-ink: #ffffff;
      --bubble-user: #262626;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      background: radial-gradient(ellipse 120% 90% at 50% 40%, var(--bg-center) 0%, var(--bg) 75%) fixed;
      color: var(--ink);
      font-family: 'Inter', system-ui, sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    /* ---- conversation column ---- */
    main {
      width: min(720px, 100%);
      flex: 1;
      padding: 24px 20px 140px; /* bottom space so the fixed input never covers content */
    }

    /* greeting shown before the first message, like a fresh chat */
    .greeting {
      margin-top: 22vh;
      text-align: center;
    }
    .greeting h1 {
      font-family: 'Lora', Georgia, serif;
      font-weight: 400;
      font-size: 2rem;
      letter-spacing: -0.01em;
      margin: 0 0 10px;
    }
    .greeting p { color: var(--ink-soft); font-size: 0.95rem; margin: 0; }

    .turn { margin: 26px 0; display: flex; }
    .turn.user { justify-content: flex-end; }
    .turn.model { justify-content: flex-start; }

    /* user turn: the uploaded photo in a soft rounded bubble, right-aligned */
    .bubble {
      background: var(--bubble-user);
      border-radius: 16px;
      padding: 8px;
      max-width: 320px;
    }
    .bubble img {
      display: block;
      width: 100%;
      max-height: 300px;
      object-fit: contain;
      border-radius: 10px;
    }

    /* model turn: plain text on the page, no bubble */
    .reply {
      max-width: 85%;
      font-size: 0.95rem;
      line-height: 1.7;
    }
    .reply.waiting { color: var(--ink-soft); }
    .reply.waiting::after {
      content: '';
      display: inline-block;
      width: 9px; height: 9px;
      margin-left: 6px;
      border-radius: 50%;
      background: var(--accent);
      animation: pulse 1s ease-in-out infinite;
      vertical-align: baseline;
    }
    @keyframes pulse { 50% { opacity: 0.25; transform: scale(0.8); } }
    .reply.error { color: #e0785a; }

    /* ---- fixed bottom input bar ---- */
    .composer-wrap {
      position: fixed;
      bottom: 0;
      left: 0; right: 0;
      display: flex;
      justify-content: center;
      padding: 0 20px 22px;
      background: linear-gradient(to top, var(--bg) 55%, rgba(20, 20, 20, 0) 100%);
      pointer-events: none;
    }
    .composer {
      pointer-events: auto;
      width: min(720px, 100%);
      background: var(--bg-input);
      border: 1px solid var(--edge-strong);
      border-radius: 22px;
      box-shadow: 0 6px 24px rgba(0, 0, 0, 0.35);
      padding: 10px 12px;
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .attach {
      width: 34px; height: 34px;
      flex-shrink: 0;
      border-radius: 50%;
      border: 1px solid var(--edge-strong);
      background: transparent;
      color: var(--ink-soft);
      font-size: 1.15rem;
      line-height: 1;
      cursor: pointer;
      transition: background 120ms ease;
    }
    .attach:hover { background: var(--bubble-user); }
    .composer .field {
      flex: 1;
      min-width: 0;
      font-size: 0.92rem;
      color: var(--ink-soft);
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      user-select: none;
    }
    .composer .field.has-file { color: var(--ink); }
    .thumb {
      height: 34px; width: 34px;
      object-fit: cover;
      border-radius: 8px;
      border: 1px solid var(--edge);
      flex-shrink: 0;
      display: none;
    }
    .send {
      width: 34px; height: 34px;
      flex-shrink: 0;
      border-radius: 10px;
      border: none;
      background: var(--accent);
      color: var(--accent-ink);
      font-size: 1rem;
      cursor: pointer;
      transition: opacity 120ms ease;
    }
    .send:disabled { opacity: 0.35; cursor: not-allowed; }
    .attach:focus-visible, .send:focus-visible { outline: 2px solid var(--accent); outline-offset: 2px; }

    footer.note {
      position: fixed;
      bottom: 4px;
      width: 100%;
      text-align: center;
      font-size: 0.68rem;
      color: var(--ink-soft);
      pointer-events: none;
    }
    @media (prefers-reduced-motion: reduce) {
      .reply.waiting::after { animation: none; }
    }
  </style>
</head>
<body>
  <main id="chat">
    <div class="greeting" id="greeting">
      <h1>What shall we caption today?</h1>
      <p>Attach a photo below and the model will describe what it sees.</p>
    </div>
  </main>

  <div class="composer-wrap">
    <div class="composer">
      <input type="file" id="file" accept="image/*" hidden />
      <button class="attach" id="attach" title="Attach an image" aria-label="Attach an image">+</button>
      <img class="thumb" id="thumb" alt="" />
      <div class="field" id="field">Attach an image to caption</div>
      <button class="send" id="send" disabled title="Send" aria-label="Send">&#8593;</button>
    </div>
  </div>
  <footer class="note">CLIP ViT-L/14 + attention GRU, trained on Flickr8k. Captions may be imperfect.</footer>

  <script>
    const fileInput = document.getElementById('file');
    const attachBtn = document.getElementById('attach');
    const sendBtn = document.getElementById('send');
    const field = document.getElementById('field');
    const thumb = document.getElementById('thumb');
    const chat = document.getElementById('chat');
    let selected = null;

    attachBtn.addEventListener('click', () => fileInput.click());

    fileInput.addEventListener('change', () => {
      selected = fileInput.files[0] ?? null;
      if (selected) {
        field.textContent = selected.name;
        field.classList.add('has-file');
        thumb.src = URL.createObjectURL(selected);
        thumb.style.display = 'block';
      } else {
        resetComposer();
      }
      sendBtn.disabled = !selected;
    });

    function resetComposer() {
      selected = null;
      fileInput.value = '';
      field.textContent = 'Attach an image to caption';
      field.classList.remove('has-file');
      thumb.style.display = 'none';
      sendBtn.disabled = true;
    }

    sendBtn.addEventListener('click', async () => {
      if (!selected) return;
      const file = selected;
      const previewUrl = thumb.src; // reuse the object URL for the chat bubble
      resetComposer();
      document.getElementById('greeting')?.remove();

      // user turn: the photo in a right-aligned bubble
      const userTurn = document.createElement('div');
      userTurn.className = 'turn user';
      userTurn.innerHTML = '<div class="bubble"><img alt="uploaded photo" /></div>';
      userTurn.querySelector('img').src = previewUrl;
      chat.appendChild(userTurn);

      // model turn: plain text reply with a thinking indicator
      const modelTurn = document.createElement('div');
      modelTurn.className = 'turn model';
      modelTurn.innerHTML = '<div class="reply waiting">Looking at the image</div>';
      chat.appendChild(modelTurn);
      modelTurn.scrollIntoView({ behavior: 'smooth', block: 'end' });

      const reply = modelTurn.querySelector('.reply');
      try {
        const form = new FormData();
        form.append('image', file);
        const res = await fetch('/api/caption', { method: 'POST', body: form });
        const body = await res.json();
        if (!res.ok) throw new Error(body.detail || `Request failed (${res.status})`);
        reply.textContent = body.caption;
        reply.className = 'reply';
      } catch (err) {
        reply.textContent = err.message + ' — try another image.';
        reply.className = 'reply error';
      }
      modelTurn.scrollIntoView({ behavior: 'smooth', block: 'end' });
    });
  </script>
</body>
</html>
